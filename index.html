<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- 不快取進入點:每次載入都重新驗證 index.html,避免看到舊畫面 -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>VFXGEN — 遊戲特效貼圖產生器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Michroma&family=Martian+Mono:wght@300;400;600&family=Chivo:wght@300;400;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=94">
</head>
<body>
<div id="app" class="simple">
  <header id="topbar">
    <div class="brand">
      <span class="brand-mark">◆</span>
      <span class="brand-name">VFX<em>GEN</em></span>
      <span class="brand-sub">遊戲特效貼圖產生器<span class="en"> · Game VFX Texture Generator</span></span>
    </div>
    <div class="tb-group">
      <button id="btn-gallery" class="accent">🖼 範本牆</button>
      <button id="btn-mode" title="進階模式:展開底層節點編輯器">🔧 進階</button>
    </div>
    <div class="tb-spacer"></div>
    <div class="tb-group">
      <label>預覽</label>
      <select id="preview-res">
        <option value="128">128²</option>
        <option value="256" selected>256²</option>
        <option value="512">512²</option>
      </select>
      <label id="lb-export">輸出</label>
      <select id="export-res">
        <option value="256">256²</option>
        <option value="512" selected>512²</option>
        <option value="1024">1024²</option>
      </select>
      <button id="btn-recipe" title="複製節點串接與參數,可直接貼給 AI 或存成範本">⎘ 配方</button>
      <button id="btn-export" class="primary">⭳ 匯出 PNG</button>
      <button id="btn-settings" title="設定:語言 / 主題 / 檔案">⚙</button>
    </div>
    <div id="settings-menu" class="hidden">
      <div class="sm-row"><span class="sm-label">🌐 語言</span>
        <select id="lang-select">
          <option value="zh">中文</option>
          <option value="en">EN</option>
        </select>
      </div>
      <div class="sm-row"><span class="sm-label">🎨 主題</span>
        <select id="theme-select" title="介面主題配色">
        <option value="forge">🔥 熔光琥珀</option>
        <option value="iron">🧊 寒鐵靛青</option>
        <option value="royal">🔷 皇家藍</option>
        <option value="jade">🌿 翡翠爐</option>
        <option value="blood">🌹 血月紅</option>
        <option value="volt">⚡ 紫電</option>
        <option value="moon">🌙 月銀</option>
      </select>
      </div>
      <div class="sm-sep"></div>
      <div class="sm-row" id="tb-graph-ops">
        <button id="btn-clear" title="清空節點圖">清空</button>
        <button id="btn-save" title="下載節點圖 JSON">存檔</button>
        <button id="btn-load" title="載入節點圖 JSON">讀檔</button>
        <input type="file" id="file-load" hidden accept=".json">
      </div>
    </div>
  </header>

  <div id="body">
    <aside id="library">
      <button id="lib-collapse" class="panel-toggle" title="收合節點庫">◀</button>
      <div class="lib-title">節點庫</div>
      <div id="lib-list"></div>
    </aside>

    <button id="lib-expand" class="panel-expand left hidden" title="展開節點庫">▶</button>
    <button id="insp-expand" class="panel-expand right hidden" title="展開預覽面板">◀</button>
    <main id="viewport">
      <div id="world">
        <svg id="wires"></svg>
        <div id="nodes-layer"></div>
      </div>
    </main>

    <aside id="inspector">
      <div id="insp-resize" title="拖曳調整預覽面板寬度"></div>
      <button id="insp-collapse" class="panel-toggle" title="收合預覽面板">▶</button>
      <section id="preview-sec">
        <div class="sec-title">預覽<span id="preview-src"></span><button id="preview-pin" title="鎖定預覽顯示 Output(調中間節點也能盯著最終結果)">📌</button></div>
        <div id="preview-wrap"><canvas id="preview" width="512" height="512"></canvas></div>
        <div class="preview-ctl">
          <label>背景</label>
          <select id="preview-bg">
            <option value="black" selected>黑色</option>
            <option value="checker">棋盤格</option>
            <option value="dark">深灰</option>
          </select>
          <label class="chk"><input type="checkbox" id="preview-tile"> 2×2 無縫</label>
        </div>
        <div id="export-bar"></div>
      </section>
      <section id="params-sec">
        <div id="sparams-resize" title="拖曳調整參數欄寬度"></div>
        <div class="sec-title">參數<span id="param-node-name"></span></div>
        <div id="params"><div class="params-empty">點選節點以編輯參數</div></div>
      </section>
    </aside>
  </div>

  <!-- 範本膠卷(Forge Template Reel) -->
  <div id="strip">
    <div id="reel-resize" title="拖曳調整膠卷大小"></div>
    <div class="strip-head">
      <span class="s-en">TEMPLATE REEL</span><span class="s-zh">範本膠卷</span>
      <div class="reel-cats" id="reel-cats"></div>
      <button id="strip-toggle" title="收合/展開膠卷">▾</button>
    </div>
    <div class="reel-cards" id="reel-cards"></div>
  </div>

  <footer id="statusbar">
    <span id="hint">Ctrl+Z 復原 · Space 新增節點 · 框選多選 · 中鍵/Shift 平移 · Ctrl+C/V 複製貼上 · F 全覽 · Delete 刪除</span>
    <span id="perf"></span>
  </footer>

  <!-- 右鍵選單 -->
  <div id="ctx-menu" class="hidden"></div>

  <!-- 範本縮圖牆 -->
  <div id="gallery" class="hidden">
    <div id="gallery-panel">
      <div id="gallery-head">
        <span class="g-title">範本牆</span>
        <span class="g-sub">點選縮圖載入完整節點鏈,可自由拆解修改 · Esc 關閉</span>
        <button id="gallery-close" title="關閉">✕</button>
      </div>
      <div id="gallery-body"></div>
    </div>
  </div>
</div>

<script src="js/i18n.js?v=94"></script>
<script src="js/filters.js?v=94"></script>
<script src="js/nodes.js?v=94"></script>
<script src="js/graph.js?v=94"></script>
<script src="js/editor.js?v=94"></script>
<script src="js/presets.js?v=94"></script>
<script src="js/ui.js?v=94"></script>
<script src="js/main.js?v=94"></script>
</body>
</html>
