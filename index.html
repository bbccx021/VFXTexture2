<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- 不快取進入點:每次載入都重新驗證 index.html,避免看到舊畫面 -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>VFXGEN — 遊戲特效貼圖產生器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=64">
</head>
<body>
<div id="app" class="simple">
  <header id="topbar">
    <div class="brand">
      <span class="brand-mark">◆</span>
      <span class="brand-name">VFX<em>GEN</em></span>
      <span class="brand-sub">遊戲特效貼圖產生器<span class="en"> · Game VFX Texture Generator</span></span>
    </div>
    <div class="tb-group">
      <button id="btn-gallery" class="accent">🖼 範本牆</button>
      <button id="btn-mode" title="進階模式:展開底層節點編輯器">🔧 進階</button>
      <select id="theme-select" title="介面主題配色">
        <option value="teal">🎨 深海青</option>
        <option value="indigo">🎨 皇家藍</option>
        <option value="emerald">🎨 翡翠綠</option>
        <option value="violet">🎨 電馭紫</option>
        <option value="crimson">🎨 暗血紅</option>
        <option value="magenta">🎨 烈焰洋紅</option>
        <option value="ember">🎨 熔爐橘</option>
      </select>
    </div>
    <div class="tb-group" id="tb-graph-ops">
      <button id="btn-clear" title="清空節點圖">清空</button>
      <button id="btn-save" title="下載節點圖 JSON">存檔</button>
      <button id="btn-load" title="載入節點圖 JSON">讀檔</button>
      <input type="file" id="file-load" hidden accept=".json">
    </div>
    <div class="tb-spacer"></div>
    <div class="tb-group">
      <label>預覽</label>
      <select id="preview-res">
        <option value="128">128²</option>
        <option value="256" selected>256²</option>
        <option value="512">512²</option>
      </select>
      <label>輸出</label>
      <select id="export-res">
        <option value="256">256²</option>
        <option value="512" selected>512²</option>
        <option value="1024">1024²</option>
      </select>
      <button id="btn-recipe" title="複製節點串接與參數,可直接貼給 AI 或存成範本">⎘ 配方</button>
      <button id="btn-export" class="primary">⭳ 匯出 PNG</button>
    </div>
  </header>

  <div id="body">
    <aside id="library">
      <div class="lib-title">節點庫</div>
      <div id="lib-list"></div>
    </aside>

    <main id="viewport">
      <div id="world">
        <svg id="wires"></svg>
        <div id="nodes-layer"></div>
      </div>
    </main>

    <aside id="inspector">
      <div id="insp-resize" title="拖曳調整預覽面板寬度"></div>
      <section id="preview-sec">
        <div class="sec-title">預覽<span id="preview-src"></span><button id="preview-pin" title="鎖定預覽顯示 Output(調中間節點也能盯著最終結果)">📌</button></div>
        <div id="preview-wrap"><canvas id="preview" width="512" height="512"></canvas></div>
        <div class="preview-ctl">
          <label>背景</label>
          <select id="preview-bg">
            <option value="black" selected>黑色</option>
            <option value="checker">棋盤格</option>
            <option value="dark">深灰</option>
          </select>
          <label class="chk"><input type="checkbox" id="preview-tile"> 2×2 無縫</label>
        </div>
      </section>
      <section id="params-sec">
        <div class="sec-title">參數<span id="param-node-name"></span></div>
        <button id="btn-variant" title="隨機化圖中所有種子,一鍵產生變體"><span class="dice">🎲</span>隨機變體</button>
        <div id="params"><div class="params-empty">點選節點以編輯參數</div></div>
      </section>
    </aside>
  </div>

  <footer id="statusbar">
    <span id="hint">Ctrl+Z 復原 · Space 新增節點 · Ctrl+C/V 複製貼上 · F 全覽 · 右鍵選單 · 雙擊連線斷開 · Delete 刪除</span>
    <span id="perf"></span>
  </footer>

  <!-- 右鍵選單 -->
  <div id="ctx-menu" class="hidden"></div>

  <!-- 範本縮圖牆 -->
  <div id="gallery" class="hidden">
    <div id="gallery-panel">
      <div id="gallery-head">
        <span class="g-title">範本牆</span>
        <span class="g-sub">點選縮圖載入完整節點鏈,可自由拆解修改 · Esc 關閉</span>
        <button id="gallery-close" title="關閉">✕</button>
      </div>
      <div id="gallery-body"></div>
    </div>
  </div>
</div>

<script src="js/filters.js?v=64"></script>
<script src="js/nodes.js?v=64"></script>
<script src="js/graph.js?v=64"></script>
<script src="js/editor.js?v=64"></script>
<script src="js/presets.js?v=64"></script>
<script src="js/ui.js?v=64"></script>
<script src="js/main.js?v=64"></script>
</body>
</html>
